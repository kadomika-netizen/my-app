
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{padding:1rem 0;max-width:960px}
.header{margin-bottom:1.2rem}
.header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:13px;color:var(--color-text-secondary);margin-top:4px}
.name-section{display:flex;gap:8px;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap}
.name-section label{font-size:13px;color:var(--color-text-secondary)}
.name-section input{padding:6px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);width:180px}
.sync-status{font-size:11px;padding:3px 8px;border-radius:4px;margin-left:4px}
.sync-ok{background:#E1F5EE;color:#0F6E56}
.sync-err{background:#FCEBEB;color:#A32D2D}
.sync-loading{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.view-toggle{display:flex;gap:8px;margin-bottom:1.2rem}
.view-btn{padding:6px 16px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary)}
.view-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.legend{display:flex;gap:14px;margin-bottom:1rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)}
.dot{width:10px;height:10px;border-radius:50%}
.dot-mine{background:#378ADD}
.dot-other{background:#1D9E75}
.dot-holiday{background:#B4B2A9}
.month-label{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;margin-top:1.2rem}
.month-label:first-of-type{margin-top:0}
.week-header{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;margin-bottom:2px}
.week-header div{text-align:center;font-size:11px;color:var(--color-text-secondary);padding:2px}
.week-header .sun{color:#E24B4A}.week-header .sat{color:#378ADD}
.cal-grid{display:flex;flex-direction:column;gap:2px}
.cal-week{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px}
.week-num{font-size:10px;color:var(--color-text-tertiary);display:flex;align-items:center;padding-left:2px}
.cal-day{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:3px;min-height:76px;background:var(--color-background-primary)}
.cal-day.active-day{cursor:pointer}
.cal-day.active-day:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-day.holiday{background:var(--color-background-secondary)}
.day-num{font-size:11px;font-weight:500;margin-bottom:2px}
.day-num.sun{color:#E24B4A}.day-num.sat{color:#378ADD}
.today-badge{background:#378ADD;color:white;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px}
.class-slots{display:flex;flex-direction:column;gap:1px}
.slot{font-size:9px;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-empty{border:0.5px dashed var(--color-border-tertiary);color:var(--color-text-tertiary)}
.slot-other{background:#E1F5EE;color:#0F6E56;border:0.5px solid #5DCAA5}
.slot-mine{background:#E6F1FB;color:#185FA5;border:0.5px solid #85B7EB;font-weight:500}
.holiday-label{font-size:8px;color:var(--color-text-tertiary);text-align:center;margin-top:2px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.5rem;width:340px;max-width:92vw}
.modal h3{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem}
.class-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.class-btn{padding:10px 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);text-align:center;line-height:1.6}
.class-btn:hover:not(.filled){background:var(--color-background-secondary)}
.class-btn.filled{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;cursor:default}
.class-btn.mine{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;font-weight:500;cursor:pointer}
.class-btn.mine:hover{background:#B5D4F4}
.modal-footer{display:flex;justify-content:flex-end}
.modal-footer button{padding:6px 16px;font-size:13px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary)}
.modal-footer button:hover{background:var(--color-background-secondary)}
.list-view{display:flex;flex-direction:column;gap:6px}
.list-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer}
.list-item:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.list-date{font-size:13px;font-weight:500;color:var(--color-text-primary);min-width:130px}
.list-classes{display:flex;gap:5px;flex-wrap:wrap}
.ls{font-size:11px;padding:2px 7px;border-radius:4px}
.ls-empty{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px dashed var(--color-border-tertiary)}
.ls-other{background:#E1F5EE;color:#0F6E56;border:0.5px solid #5DCAA5}
.ls-mine{background:#E6F1FB;color:#185FA5;border:0.5px solid #85B7EB;font-weight:500}
.hidden{display:none}
.saving-overlay{position:fixed;bottom:16px;right:16px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 12px;font-size:12px;color:var(--color-text-secondary);z-index:200;display:none}
</style>

<h2 class="sr-only">給食サポートスケジュール管理アプリ。2026年4月22日から6月5日まで、1年生4クラスのサポート当番を複数人で共有して登録できます。</h2>

<div class="app">
  <div class="header">
    <h1>給食サポートスケジュール</h1>
    <p>1年生 4クラス対象 ／ 2026年4月22日（水）〜6月5日（金）　※複数人で共有されます</p>
  </div>

  <div class="name-section">
    <label>お名前：</label>
    <input type="text" id="userName" placeholder="山田 花子" maxlength="20">
    <span id="syncStatus" class="sync-status sync-loading">読み込み中...</span>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('calendar',this)">カレンダー</button>
    <button class="view-btn" onclick="setView('list',this)">リスト</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot dot-mine"></div>自分の登録</div>
    <div class="legend-item"><div class="dot dot-other"></div>他の方の登録</div>
    <div class="legend-item"><div class="dot dot-holiday"></div>休日・祝日</div>
  </div>

  <div id="calendar-view"></div>
  <div id="list-view" class="hidden list-view"></div>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="class-btn-grid" id="class-buttons"></div>
    <div class="modal-footer"><button onclick="closeModal()">閉じる</button></div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay">保存中...</div>

<script>
const CLASSES=['1組','2組','3組','4組'];
const WDAYS=['日','月','火','水','木','金','土'];
const HOLIDAYS={
  '2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日',
  '2026-05-04':'みどりの日',
  '2026-05-05':'こどもの日',
  '2026-05-06':'振替休日'
};
const START=new Date(2026,3,22);
const END=new Date(2026,5,5);
const STORAGE_KEY='kyushoku-registrations-2026';

let registrations={};
let currentView='calendar';
let selectedDay=null;
let pollTimer=null;

function toKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function isWeekend(d){return d.getDay()===0||d.getDay()===6}
function isHoliday(d){return !!HOLIDAYS[toKey(d)]}
function isSchoolDay(d){return !isWeekend(d)&&!isHoliday(d)}
function getUser(){return document.getElementById('userName').value.trim()}

function setSyncStatus(state,msg){
  const el=document.getElementById('syncStatus');
  el.className='sync-status '+(state==='ok'?'sync-ok':state==='err'?'sync-err':'sync-loading');
  el.textContent=msg;
}

async function loadData(){
  try{
    const res=await window.storage.get(STORAGE_KEY,true);
    registrations=res?JSON.parse(res.value):{};
    setSyncStatus('ok','同期済み ✓');
  }catch(e){
    registrations={};
    setSyncStatus('err','読み込みエラー');
  }
  render();
}

async function saveData(){
  document.getElementById('savingOverlay').style.display='block';
  try{
    await window.storage.set(STORAGE_KEY,JSON.stringify(registrations),true);
    setSyncStatus('ok','保存済み ✓');
  }catch(e){
    setSyncStatus('err','保存エラー');
  }
  document.getElementById('savingOverlay').style.display='none';
}

function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(document.getElementById('modal').classList.contains('hidden')){
      try{
        const res=await window.storage.get(STORAGE_KEY,true);
        const remote=res?JSON.parse(res.value):{};
        if(JSON.stringify(remote)!==JSON.stringify(registrations)){
          registrations=remote;
          render();
          setSyncStatus('ok','更新されました ✓');
        }
      }catch(e){}
    }
  },8000);
}

function buildAllDates(){
  const all=[];
  let d=new Date(2026,3,1);
  while(d<=END){all.push(new Date(d));d.setDate(d.getDate()+1);}
  return all;
}

function schoolDates(){
  const all=[];
  let d=new Date(START);
  while(d<=END){
    if(isSchoolDay(d))all.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return all;
}

function groupByWeek(dates){
  const weeks=[];let week=null;
  dates.forEach(d=>{
    if(!week||d.getDay()===0){week=Array(7).fill(null);weeks.push(week);}
    week[d.getDay()]=d;
  });
  return weeks;
}

function groupByMonth(dates){
  const months={};
  dates.forEach(d=>{
    const mk=d.getFullYear()+'-'+d.getMonth();
    if(!months[mk])months[mk]={label:(d.getMonth()+1)+'月',dates:[]};
    months[mk].dates.push(d);
  });
  return Object.values(months);
}

function getReg(key,cls){return(registrations[key]&&registrations[key][cls])||null}

function renderCalendar(){
  const all=buildAllDates();
  const months=groupByMonth(all);
  const today=toKey(new Date());
  const user=getUser();
  let html='';
  months.forEach(m=>{
    html+=`<div class="month-label">${m.label}</div>`;
    html+=`<div class="week-header"><div></div>`;
    WDAYS.forEach((w,i)=>html+=`<div class="${i===0?'sun':i===6?'sat':''}">${w}</div>`);
    html+='</div><div class="cal-grid">';
    groupByWeek(m.dates).forEach(week=>{
      const ws=week.find(x=>x);
      html+=`<div class="cal-week"><div class="week-num">${ws?(ws.getMonth()+1)+'/'+ws.getDate():''}</div>`;
      week.forEach((d,di)=>{
        if(!d){html+='<div class="cal-day empty"></div>';return;}
        const key=toKey(d);
        const active=isSchoolDay(d)&&d>=START&&d<=END;
        const hol=!isSchoolDay(d);
        const dc='cal-day'+(active?' active-day':'')+(hol?' holiday':'');
        const dnc='day-num'+(di===0?' sun':di===6?' sat':'');
        const isToday=key===today;
        html+=`<div class="${dc}"${active?` onclick="openModal('${key}')"`:''}><div class="${dnc}">${isToday?`<span class="today-badge">${d.getDate()}</span>`:d.getDate()}</div>`;
        if(active){
          html+='<div class="class-slots">';
          CLASSES.forEach(cls=>{
            const reg=getReg(key,cls);
            if(!reg)html+=`<div class="slot slot-empty">${cls} 空</div>`;
            else if(user&&reg===user)html+=`<div class="slot slot-mine">${cls} ${reg}</div>`;
            else html+=`<div class="slot slot-other">${cls} ${reg}</div>`;
          });
          html+='</div>';
        }else if(HOLIDAYS[key]){
          html+=`<div class="holiday-label">${HOLIDAYS[key]}</div>`;
        }
        html+='</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('calendar-view').innerHTML=html;
}

function renderList(){
  const user=getUser();
  let html='';
  schoolDates().forEach(d=>{
    const key=toKey(d);
    const dow=WDAYS[d.getDay()];
    let slots='';
    CLASSES.forEach(cls=>{
      const reg=getReg(key,cls);
      if(!reg)slots+=`<span class="ls ls-empty">${cls}：空き</span>`;
      else if(user&&reg===user)slots+=`<span class="ls ls-mine">${cls}：${reg}</span>`;
      else slots+=`<span class="ls ls-other">${cls}：${reg}</span>`;
    });
    html+=`<div class="list-item" onclick="openModal('${key}')"><span class="list-date">${d.getMonth()+1}月${d.getDate()}日（${dow}）</span><div class="list-classes">${slots}</div></div>`;
  });
  document.getElementById('list-view').innerHTML=html||'<p style="font-size:13px;color:var(--color-text-secondary)">対象日程はありません</p>';
}

function openModal(key){
  const user=getUser();
  if(!user){alert('先にお名前を入力してください');return;}
  const d=new Date(key.replace(/-/g,'/'));
  const dow=WDAYS[d.getDay()];
  document.getElementById('modal-title').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日（'+dow+'）';
  selectedDay=key;
  renderModalButtons(key,user);
  document.getElementById('modal').classList.remove('hidden');
}

function renderModalButtons(key,user){
  let html='';
  CLASSES.forEach(cls=>{
    const reg=getReg(key,cls);
    if(!reg){
      html+=`<button class="class-btn" onclick="doRegister('${key}','${cls}')">${cls}<br><span style="font-size:10px;color:var(--color-text-secondary)">空き</span><br><span style="font-size:10px;color:#1D9E75">＋ 登録する</span></button>`;
    }else if(reg===user){
      html+=`<button class="class-btn mine" onclick="doCancel('${key}','${cls}')">${cls}<br><span style="font-size:10px">${reg}</span><br><span style="font-size:10px">✕ 取りやめる</span></button>`;
    }else{
      html+=`<button class="class-btn filled">${cls}<br><span style="font-size:10px">${reg}</span><br><span style="font-size:10px">登録済み</span></button>`;
    }
  });
  document.getElementById('class-buttons').innerHTML=html;
  const hasAny=CLASSES.some(c=>getReg(key,c)===user);
  document.getElementById('modal-sub').textContent=hasAny?'青いボタンをクリックすると取りやめできます':'参加したいクラスを選んで登録してください';
}

async function doRegister(key,cls){
  const user=getUser();
  if(!user)return;
  if(!registrations[key])registrations[key]={};
  registrations[key][cls]=user;
  renderModalButtons(key,user);
  render();
  await saveData();
}

async function doCancel(key,cls){
  const user=getUser();
  if(registrations[key]&&registrations[key][cls]===user){
    delete registrations[key][cls];
    if(!Object.keys(registrations[key]).length)delete registrations[key];
  }
  renderModalButtons(key,user);
  render();
  await saveData();
}

function closeModal(){
  document.getElementById('modal').classList.add('hidden');
  selectedDay=null;
}

function setView(v,btn){
  currentView=v;
  document.getElementById('calendar-view').classList.toggle('hidden',v!=='calendar');
  document.getElementById('list-view').classList.toggle('hidden',v!=='list');
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  if(currentView==='calendar')renderCalendar();
  else renderList();
}

document.getElementById('userName').addEventListener('input',()=>render());
loadData();
startPolling();
</script>
