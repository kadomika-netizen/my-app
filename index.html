<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給食サポート</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
      background-color: #f9f9f9;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>給食サポートアプリ</h1>
    <p>必要な情報を入力してください</p>

    <input type="text" placeholder="名前を入力">
    <input type="text" placeholder="内容を入力">

    <button>登録する</button>
  </div>
</body>
</html>
